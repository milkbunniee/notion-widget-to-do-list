<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Notion Todo & Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES – Light/Dark Base Themes
       (These can be customized in the UI Settings Panel)
     ============================================================ */
    :root {
      --bg-page:        transparent; /* Transparent page background for Notion compatibility */
      --bg-widget:      #ffffff;
      --bg-header:      #ffffff;
      --bg-input:       #ffffff;
      --bg-task:        #ffffff;
      --bg-tab-active:  #F5C2D9;
      --bg-tab:         #fdf5f8;

      --border:         #F3A3C3;
      --border-input:   #F5C2D9;
      --border-task:    #F5C2D9;

      --text-primary:   #3A3A3A;
      --text-secondary: #777777;
      --text-brand:     #F3A3C3;
      --text-done:      #A0A0A0;

      /* Priority Customizer properties */
      --prio-high:      #e05a7a;
      --prio-medium:    #e07a3c;
      --prio-low:       #7abf7c;

      /* D-Day Customizer properties */
      --dday-overdue:   #e05a7a;
      --dday-today:     #e07a3c;
      --dday-soon:      #7abf7c;
      --dday-future:    #777777;
      
      /* Constants */
      --text-muted:     #b0b0b0;
      --text-overdue:   #e05a7a;
      --text-today:     #e07a3c;
      --text-ok:        #7abf7c;
      --heart-filled:   #E8598A;
      --shadow:         0 4px 20px rgba(243,163,195,0.12);
      --radius:         12px;
      --radius-sm:      6px;
      --radius-task:    8px;
      --transition:     0.2s cubic-bezier(.4,0,.2,1);
    }

    /* ── Dark Mode overrides ── */
    .dark {
      --bg-widget:      #2A1826;
      --bg-header:      #2A1826;
      --bg-input:       #3A2234;
      --bg-task:        #3A2234;
      --bg-tab-active:  #B54D7A;
      --bg-tab:         #3C2536;

      --border:         #B54D7A;
      --border-input:   #6A324E;
      --border-task:    #6A324E;

      --text-primary:   #F5E6EE;
      --text-secondary: #C8A4B8;
      --text-brand:     #F3A3C3;
      --text-done:      #6E4A5E;
    }

    /* ============================================================
       RESET & BASE
     ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg-page);
      font-family: 'Nunito', 'Inter', system-ui, sans-serif;
      color: var(--text-primary);
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
    }

    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input, textarea, select {
      font-family: inherit;
      outline: none;
      border: none;
    }

    /* ============================================================
       WIDGET SHELL (Scaling & Responsive wrapper)
     ============================================================ */
    #widget-root {
      transform-origin: top center;
      transition: transform var(--transition);
      display: flex;
      justify-content: center;
      padding: 12px;
      min-height: 100vh;
    }

    /* Scale sizes mapping */
    #widget-root.scale-small { transform: scale(0.85); width: 117%; }
    #widget-root.scale-medium { transform: scale(1.0); width: 100%; }
    #widget-root.scale-large { transform: scale(1.15); width: 87%; }

    .widget {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      background: var(--bg-widget);
      border-radius: var(--radius);
      border: 1.8px solid var(--border);
      box-shadow: 0 0 0 4px var(--bg-widget), 0 0 0 6px var(--border), var(--shadow);
      margin: 12px auto;
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
      overflow: hidden;
      height: fit-content;
      min-height: 520px;
    }

    /* ============================================================
       HEADER (Window Frame Style)
     ============================================================ */
    .widget-header {
      background: var(--bg-header);
      padding: 14px 16px 12px;
      border-bottom: 1.8px solid var(--border);
      transition: background var(--transition), border-color var(--transition);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 800;
      color: var(--text-brand);
      letter-spacing: 0.03em;
      text-transform: lowercase;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 5px;
      background: transparent;
      border: 1.2px solid var(--border);
      color: var(--text-brand);
      font-size: 12px;
      transition: background var(--transition), color var(--transition), transform .12s;
    }
    .icon-btn:hover { background: var(--bg-tab-active); color: #fff; transform: scale(1.08); }

    /* Quick-add row */
    .quick-add-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quick-add-input {
      flex: 1;
      background: var(--bg-input);
      border: 1.2px solid var(--border-input);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13.5px;
      color: var(--text-primary);
      transition: border-color var(--transition), background var(--transition);
    }
    .quick-add-input::placeholder {
      color: var(--text-muted);
      font-style: italic;
      font-weight: 300;
    }
    .quick-add-input:focus { border-color: var(--heart-filled); }

    .add-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-tab);
      border: 1.2px solid var(--border-input);
      color: var(--text-brand);
      border-radius: 6px;
      font-size: 20px;
      font-weight: 700;
      transition: background var(--transition), color var(--transition), transform .12s;
    }
    .add-btn:hover { background: var(--bg-tab-active); color: #fff; transform: scale(1.08); border-color: var(--bg-tab-active); }

    /* ============================================================
       TABS (Card replica layout - rectangular centered guides)
     ============================================================ */
    .tabs-wrap {
      padding: 8px 12px;
      background: var(--bg-tab);
      border-bottom: 1.8px solid var(--border);
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .tab-btn {
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      padding: 8px 4px;
      background: var(--bg-widget);
      color: var(--text-secondary);
      border: 1.2px solid var(--border-input);
      border-radius: 6px;
      transition: all var(--transition);
      cursor: pointer;
    }
    .tab-btn:hover {
      border-color: var(--text-brand);
      color: var(--text-brand);
    }
    .tab-btn.active {
      background: var(--bg-tab-active);
      color: #ffffff;
      border-color: var(--bg-tab-active);
      box-shadow: 0 2px 6px rgba(243,163,195,0.25);
    }

    /* ============================================================
       TASK LIST CONTAINER
     ============================================================ */
    .task-list-wrap {
      padding: 12px 14px;
      flex: 1;
      overflow-y: auto;
      min-height: 360px;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Horizontal grid layout */
    .task-list.layout-horizontal {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .task-list.layout-horizontal .task-card {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    .task-list.layout-horizontal .task-card .task-actions {
      justify-content: flex-end;
      border-top: 1px dashed var(--border-input);
      padding-top: 8px;
      margin-top: 4px;
    }

    /* ============================================================
       TASK CARD & COMPONENT STYLING
     ============================================================ */
    .task-card {
      background: var(--bg-task);
      border: 1.5px solid var(--border-task);
      border-radius: var(--radius-task);
      padding: 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: background var(--transition), border-color var(--transition), opacity .2s;
      position: relative;
      animation: slideIn .2s ease;
    }
    .task-card:hover { border-color: var(--text-brand); }
    
    /* Finished main tasks styling */
    .task-card.done {
      background: var(--bg-tab);
    }
    .task-card.done .task-title {
      text-decoration: line-through;
      color: var(--text-done);
      opacity: 0.7;
    }
    .task-card.done .d-day-badge {
      opacity: 0.4;
      text-decoration: none;
    }

    /* Left heart complete checkbox icon */
    .task-heart-checkbox {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform .12s;
      color: var(--border-input);
    }
    .task-heart-checkbox:hover { transform: scale(1.18); color: var(--heart-filled); }
    .task-heart-checkbox svg {
      width: 18px; height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      transition: fill 0.15s, stroke 0.15s, color 0.15s;
    }
    .task-heart-checkbox.checked {
      color: var(--heart-filled);
    }
    .task-heart-checkbox.checked svg {
      fill: var(--heart-filled);
      stroke: var(--heart-filled);
    }

    /* Task content area */
    .task-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .task-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.4;
      word-break: break-word;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .task-desc {
      font-size: 11.5px;
      color: var(--text-secondary);
      margin-top: 4px;
      line-height: 1.4;
    }

    /* Subitems tree layout */
    .subitems-container {
      margin-top: 8px;
      padding-left: 6px;
      border-left: 1.5px dotted var(--border-input);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .subitem-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Subitem Checkbox icon (▢ or ☑ rounded-corner style) */
    .subitem-check {
      width: 16px; height: 16px;
      border: 1.2px solid var(--border-input);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      background: var(--bg-widget);
      transition: all 0.1s;
      flex-shrink: 0;
    }
    .subitem-check:hover { border-color: var(--heart-filled); }
    .subitem-check.checked {
      background: var(--bg-tab-active);
      border-color: var(--bg-tab-active);
    }
    .subitem-check svg {
      width: 10px; height: 10px;
      stroke: #ffffff; stroke-width: 3.5;
      fill: none;
      opacity: 0;
    }
    .subitem-check.checked svg { opacity: 1; }

    .subitem-text {
      font-size: 12px;
      color: var(--text-secondary);
      transition: text-decoration .15s, color .15s;
    }
    .subitem-text.done {
      text-decoration: line-through;
      color: var(--text-done);
      opacity: 0.7;
    }

    /* Metadata details */
    .task-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
      font-family: 'Share Tech Mono', monospace;
    }

    /* D-Day badge styled inline next to task title */
    .d-day-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      font-weight: 800;
      padding: 1px 5px;
      border-radius: 4px;
      display: inline-block;
      vertical-align: middle;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid currentColor;
    }
    .d-day-badge.overdue { color: var(--dday-overdue); }
    .d-day-badge.today   { color: var(--dday-today); }
    .d-day-badge.soon    { color: var(--dday-soon); }
    .d-day-badge.future  { color: var(--dday-future); }

    /* Priority hashtags color coding - Rendered as LAST item in card metadata */
    .priority-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      background: transparent;
      border: 1px solid currentColor;
    }
    .priority-badge.p-high { color: var(--prio-high); }
    .priority-badge.p-medium { color: var(--prio-medium); }
    .priority-badge.p-low { color: var(--prio-low); }

    /* Card Actions column (Right side) */
    .task-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      align-self: center;
    }

    .postpone-btn {
      font-size: 16px;
      color: var(--text-brand);
      cursor: pointer;
      transition: color 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
    }
    .postpone-btn:hover {
      color: var(--heart-filled);
      transform: translateX(3px);
    }

    .action-close-btn {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      border: 1.2px solid var(--border-input);
      font-size: 12px;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    .action-close-btn:hover { border-color: var(--text-overdue); color: var(--text-overdue); background: rgba(224,90,122,0.05); }

    /* Empty states */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 12.5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .empty-state svg { opacity: 0.5; width: 44px; height: 44px; stroke: var(--text-brand); }

    /* ============================================================
       ALL TAB SPECIAL SECTIONS (Renamed from History)
     ============================================================ */
    .all-section-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--text-brand);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 14px 0 8px 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .all-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      border-bottom: 1.2px dashed var(--border-input);
    }

    /* ============================================================
       FOOTER
     ============================================================ */
    .widget-footer {
      padding: 12px 16px;
      border-top: 1.8px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: var(--bg-widget);
    }

    .footer-brand {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.22em;
      color: var(--text-brand);
      text-transform: uppercase;
      opacity: 0.8;
    }

    .footer-refresh-btn {
      position: absolute;
      right: 16px;
      color: var(--text-brand);
      opacity: 0.7;
      transition: opacity 0.15s, transform 0.15s;
      cursor: pointer;
    }
    .footer-refresh-btn:hover {
      opacity: 1;
      transform: rotate(60deg);
    }

    /* ============================================================
       MODAL BASE STYLING
     ============================================================ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.15);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(2px);
      animation: fadeIn .15s ease;
    }
    .modal-overlay.open { display: flex; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--bg-widget);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(243,163,195,0.25);
      border: 1.8px solid var(--border);
      animation: popIn .2s cubic-bezier(.4,0,.2,1);
      transition: background var(--transition), border-color var(--transition);
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-brand);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group { margin-bottom: 12px; }

    .form-label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: var(--bg-input);
      border: 1.2px solid var(--border-input);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      color: var(--text-primary);
      transition: border-color var(--transition), background var(--transition);
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--heart-filled); }
    .form-textarea { resize: vertical; min-height: 50px; line-height: 1.4; }

    /* Subitems list inside Task Editor Modal */
    .subitem-list-modal {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .subitem-row-modal {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .subitem-input-modal {
      flex: 1;
      background: var(--bg-input);
      border: 1.2px solid var(--border-input);
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 12px;
      color: var(--text-primary);
    }
    .subitem-input-modal:focus { border-color: var(--heart-filled); }

    .subitem-del-modal {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      border-radius: 4px;
      font-size: 16px;
    }
    .subitem-del-modal:hover { color: var(--text-overdue); }

    .add-subitem-btn {
      font-size: 11px;
      color: var(--text-brand);
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }
    .add-subitem-btn:hover { opacity: 0.8; }

    /* Modal footer actions */
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-primary {
      flex: 1;
      padding: 10px;
      background: var(--bg-tab-active);
      color: #fff;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 800;
      transition: background var(--transition), transform .1s;
    }
    .btn-primary:hover { background: var(--heart-filled); transform: translateY(-1px); }

    .btn-ghost {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      background: transparent;
      border: 1.2px solid var(--border-input);
      transition: all var(--transition);
    }
    .btn-ghost:hover { border-color: var(--text-primary); color: var(--text-primary); }

    /* ============================================================
       SETTINGS & HEX CUSTOMIZER PANEL (Drawer/Modal overlay)
     ============================================================ */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .color-picker-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .color-picker-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .color-input-preview {
      width: 28px;
      height: 28px;
      border: 1.2px solid var(--border-input);
      border-radius: 4px;
      padding: 0;
      cursor: pointer;
      background: none;
    }
  </style>
</head>
<body>

<div id="widget-root" class="scale-medium">
  <div class="widget" id="main-widget">

    <!-- ── HEADER ── -->
    <div class="widget-header">
      <div class="header-top">
        <div class="header-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line>
            <line x1="3" y1="12" x2="3.01" y2="12"></line>
            <line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
          <span id="label-app-title">to do list</span>
        </div>
        <div class="header-controls">
          <!-- Language Selector Switch -->
          <button class="icon-btn" id="lang-toggle" title="Switch language (EN / PT-BR)" style="font-weight:800; font-size:10px;">
            EN
          </button>
          <!-- Dark Mode Switch -->
          <button class="icon-btn" id="dark-toggle" title="Toggle Dark Mode">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <!-- Customizer Panel Gear Icon -->
          <button class="icon-btn" id="settings-open-btn" title="Widget Settings">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>

  // Backfill colors inside storage config

  if (!configs.colors.prioMedium) configs.colors.prioMedium = defaultConfigs.colors.prioMedium;

  if (!configs.colors.ddayFuture) configs.colors.ddayFuture = defaultConfigs.colors.ddayFuture;

  applyConfigs();
}

// ── UTILITIES & DATE CALCULATIONS ──
const todayStr = () => new Date().toISOString().slice(0, 10);

function parsePriority(title) {
  if (title.includes('#high')) return 'high';
  if (title.includes('#medium')) return 'medium';
  if (title.includes('#low')) return 'low';
  return '';
}

function cleanTitle(title) {
  return title.replace(/#high|#medium|#low/g, '').trim();
}

function getDaysDiff(deadline) {
  if (!deadline) return null;
  const now = new Date(todayStr());
  const dead = new Date(deadline);
  const diffTime = dead - now;
  return Math.round(diffTime / (1000 * 60 * 60 * 24));
}

// ── D-DAY INDICATOR (D-Day / D-X / D+Y) ──
function getDDayString(deadline) {
  if (!deadline) return '';
  const diff = getDaysDiff(deadline);
  
  if (diff < 0) {
    return `D+${Math.abs(diff)}`;
  } else if (diff === 0) {
    return `D-Day`;
  } else {
    return `D-${diff}`;
  }
}

function getDDayClass(deadline) {
  if (!deadline) return '';
  const diff = getDaysDiff(deadline);
  if (diff < 0) return 'overdue';
  if (diff === 0) return 'today';
  if (diff <= 7) return 'soon';
  return 'future';
}

function formatTaskDate(deadline) {
  if (!deadline) return '';
  const dateParts = deadline.split('-');
  if (dateParts.length !== 3) return deadline;
  const [yyyy, mm, dd] = dateParts;
  return configs.lang === 'pt' ? `${dd}/${mm}/${yyyy}` : `${mm}/${dd}/${yyyy}`;
}

// ── SORTING ALGORITHM ──
function sortTasks(taskList) {
  const prioMap = { 'high': 3, 'medium': 2, 'low': 1, '': 0 };

  return [...taskList].sort((a, b) => {
    if (a.done !== b.done) {
      return a.done ? 1 : -1;
    }

    const pA = parsePriority(a.title);
    const pB = parsePriority(b.title);
    if (prioMap[pA] !== prioMap[pB]) {
      return prioMap[pB] - prioMap[pA];
    }

    if (a.deadline && b.deadline) {
      return new Date(a.deadline) - new Date(b.deadline);
    }
    if (a.deadline) return -1;
    if (b.deadline) return 1;

    return 0;
  });
}

// ── TASK FILTERING BY TAB ──
function getFilteredTasks() {
  const today = todayStr();
  const nextWeek = new Date();
  nextWeek.setDate(nextWeek.getDate() + 7);
  const nextWeekStr = nextWeek.toISOString().slice(0, 10);

  const nextMonth = new Date();
  nextMonth.setDate(nextMonth.getDate() + 30);
  const nextMonthStr = nextMonth.toISOString().slice(0, 10);

  if (activeTab === 'today') {
    return tasks.filter(t => !t.done && (t.deadline === today || !t.deadline || getDaysDiff(t.deadline) <= 0));
  }
  if (activeTab === 'weekly') {
    return tasks.filter(t => !t.done && t.deadline && t.deadline >= today && t.deadline <= nextWeekStr);
  }
  if (activeTab === 'monthly') {
    return tasks.filter(t => !t.done && t.deadline && t.deadline >= today && t.deadline <= nextMonthStr);
  }
  return tasks; // All tab contains everything (including completed)
}

// ── RENDER ENGINE ──
function render() {
  const container = document.getElementById('task-list');
  const filtered = getFilteredTasks();
  const sorted = sortTasks(filtered);
  const dictionary = i18n[configs.lang];

  container.className = 'task-list';
  if (configs.layout === 'horizontal') {
    container.classList.add('layout-horizontal');
  }

  // Handle normal tabs
  if (activeTab !== 'all') {
    if (sorted.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
          <span>No tasks found</span>
        </div>`;
      return;
    }
    container.innerHTML = sorted.map(t => renderTaskCard(t)).join('');
  } else {
    // "All" tab: completed vs pending grouped separately
    const completedList = sorted.filter(t => t.done);
    const pendingList = sorted.filter(t => !t.done);

    if (completedList.length === 0 && pendingList.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <span>History empty</span>
        </div>`;
      return;
    }

    let html = '';
    if (pendingList.length > 0) {
      html += `<div class="all-section-title">${dictionary.historyPending}</div>`;
      html += pendingList.map(t => renderTaskCard(t)).join('');
    }
    if (completedList.length > 0) {
      html += `<div class="all-section-title">${dictionary.historyCompleted}</div>`;
      html += completedList.map(t => renderTaskCard(t)).join('');
    }
    container.innerHTML = html;
  }

  attachEvents();
}

function renderTaskCard(t) {
  const prio = parsePriority(t.title);
  const displayTitle = cleanTitle(t.title);
  const hasDesc = t.desc && t.desc.trim();
  const hasSubs = t.subitems && t.subitems.length > 0;

  // D-Day details
  const dDayText = getDDayString(t.deadline);
  const dDayClass = getDDayClass(t.deadline);
  const dDayBadge = dDayText ? `<span class="d-day-badge ${dDayClass}">${dDayText}</span>` : '';

  let priorityBadge = '';
  if (prio) {
    priorityBadge = `<span class="priority-badge p-${prio}">#${prio}</span>`;
  }

  const formattedDate = t.deadline ? `<span style="opacity:0.6; font-size:10px;">${formatTaskDate(t.deadline)}</span>` : '';

  return `
  <div class="task-card ${t.done ? 'done' : ''}" data-id="${t.id}">
    <!-- Custom Heart Done Checkbox on the left -->
    <div class="task-heart-checkbox ${t.done ? 'checked' : ''}" data-action="toggle-check" data-id="${t.id}" title="Toggle state">
      ${heartSVG}
    </div>

    <!-- Main Card Body -->
    <div class="task-main" data-action="edit-modal-trigger" data-id="${t.id}" style="cursor:pointer;">
      <div class="task-title ${t.liked && !t.done ? 'liked' : ''}">
        <span>${escHtml(displayTitle)}</span>
        ${dDayBadge}
      </div>
      
      ${hasDesc ? `<div class="task-desc">${escHtml(t.desc)}</div>` : ''}

      <!-- Subitems Tree -->
      ${hasSubs ? `
        <div class="subitems-container">
          ${t.subitems.map(s => `
            <div class="subitem-row" data-id="${t.id}" data-subid="${s.id}">
              <div class="subitem-check ${s.done ? 'checked' : ''}" data-action="toggle-sub" data-id="${t.id}" data-subid="${s.id}">
                ${checkSVG}
              </div>
              <span class="subitem-text ${s.done ? 'done' : ''}">${escHtml(s.text)}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <!-- Metadata Badges: Priority (left), Date (right) -->
      ${(t.deadline || prio) ? `
        <div class="task-meta">
          ${priorityBadge}
          ${formattedDate}
        </div>
      ` : ''}
    </div>

    <!-- Right Side Actions (Heart icon removed next to X) -->
    <div class="task-actions">
      <button class="postpone-btn" data-action="postpone-one" data-id="${t.id}" title="${i18n[configs.lang].toastPostponed}">
        →
      </button>
      <button class="action-close-btn" data-action="delete-task" data-id="${t.id}" title="Delete">
        ×
      </button>
    </div>
  </div>`;
}

// ── EVENT BINDINGS & HANDLERS ──
function attachEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
}

function handleAction(e) {
  const btn = e.currentTarget;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  const subid = btn.dataset.subid;
  e.stopPropagation();

  switch (action) {
    case 'toggle-check':
      toggleTaskCompletion(id);
      break;
    case 'postpone-one':
      postponeTask(id);
      break;
    case 'delete-task':
      deleteTask(id);
      break;
    case 'edit-modal-trigger':
      openEditModal(id);
      break;
    case 'toggle-sub':
      toggleSubitem(id, subid);
      break;
  }
}

// ── CORE TASK OPERATIONS ──
function toggleTaskCompletion(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  
  t.done = !t.done;
  if (t.subitems && t.subitems.length > 0) {
    t.subitems.forEach(s => s.done = t.done);
  }
  
  saveTasks();
  render();
}

function toggleSubitem(id, subid) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const sub = t.subitems.find(s => s.id === subid);
  if (!sub) return;

  sub.done = !sub.done;

  // Auto completed trigger
  const allCompleted = t.subitems.every(s => s.done);
  t.done = allCompleted;

  saveTasks();
  render();
}

function postponeTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;

  const current = t.deadline ? new Date(t.deadline) : new Date();
  current.setDate(current.getDate() + 1);
  t.deadline = current.toISOString().slice(0, 10);
  
  saveTasks();
  render();
  showToast(i18n[configs.lang].toastPostponed);
}

function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  saveTasks();
  render();
  showToast(i18n[configs.lang].toastDeleted);
}

// ── QUICK ADD FIELD ──
function quickAdd() {
  const input = document.getElementById('quick-add-input');
  const title = input.value.trim();
  if (!title) return;

  tasks.unshift({
    id: uid(),
    title: title,
    desc: '',
    deadline: todayStr(),
    done: false,
    liked: false,
    subitems: []
  });

  input.value = '';
  saveTasks();
  render();
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal-title-text').textContent = i18n[configs.lang].taskNew;
  document.getElementById('field-title').value = '';
  document.getElementById('field-desc').value = '';
  document.getElementById('field-date').value = todayStr();
  document.getElementById('field-priority').value = '';
  renderModalSubitems([]);
  document.getElementById('task-modal').classList.add('open');
  document.getElementById('field-title').focus();
}

function openEditModal(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  
  editingId = id;
  document.getElementById('modal-title-text').textContent = i18n[configs.lang].taskEdit;
  
  const priority = parsePriority(t.title);
  
  document.getElementById('field-title').value = cleanTitle(t.title);
  document.getElementById('field-desc').value = t.desc || '';
  document.getElementById('field-date').value = t.deadline || '';
  document.getElementById('field-priority').value = priority;

  renderModalSubitems(t.subitems || []);
  document.getElementById('task-modal').classList.add('open');
  document.getElementById('field-title').focus();
}

function closeTaskModal() {
  document.getElementById('task-modal').classList.remove('open');
  editingId = null;
}

function renderModalSubitems(subitems) {
  const container = document.getElementById('subitem-list-modal');
  container.innerHTML = subitems.map((s, idx) => `
    <div class="subitem-row-modal" data-idx="${idx}">
      <input type="text" class="subitem-input-modal" value="${escAttr(s.text)}" placeholder="${i18n[configs.lang].placeholderSubitem}" />
      <button class="subitem-del-modal" type="button" onclick="this.closest('.subitem-row-modal').remove()">×</button>
    </div>
  `).join('');
}

function getModalSubitems() {
  return [...document.querySelectorAll('.subitem-input-modal')]
    .map(input => input.value.trim())
    .filter(Boolean)
    .map(text => ({ id: uid(), text, done: false }));
}

function saveTaskModal() {
  const cleanTitle = document.getElementById('field-title').value.trim();
  if (!cleanTitle) return;

  const desc = document.getElementById('field-desc').value.trim();
  const deadline = document.getElementById('field-date').value;
  const priority = document.getElementById('field-priority').value;

  const title = priority ? `${cleanTitle} #${priority}` : cleanTitle;
  const subitemsInput = getModalSubitems();

  if (editingId) {
    const t = tasks.find(x => x.id === editingId);
    if (t) {
      t.title = title;
      t.desc = desc;
      t.deadline = deadline;
      const oldMap = Object.fromEntries((t.subitems || []).map(s => [s.text, s]));
      t.subitems = subitemsInput.map(s => oldMap[s.text] ? { ...oldMap[s.text], text: s.text } : s);
      
      if (t.subitems.length > 0) {
        t.done = t.subitems.every(s => s.done);
      }
    }
  } else {
    tasks.unshift({
      id: uid(),
      title,
      desc,
      deadline,
      done: false,
      liked: false,
      subitems: subitemsInput
    });
  }

  saveTasks();
  closeTaskModal();
  render();
  showToast(i18n[configs.lang].toastSaved);
}

});

document.getElementById('dark-toggle').addEventListener('click', () => {
  configs.darkMode = !configs.darkMode;
  saveConfigs();
  applyConfigs();
});

document.getElementById('footer-reset-btn').addEventListener('click', () => {
  if (confirm(i18n[configs.lang].confirmReset)) {
    tasks = getSampleTasks();
    saveTasks();
    render();
    showToast(i18n[configs.lang].toastReloaded);
  }
});

document.getElementById('quick-add-btn').addEventListener('click', quickAdd);
document.getElementById('quick-add-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') quickAdd();
});

document.getElementById('modal-cancel').addEventListener('click', closeTaskModal);
document.getElementById('modal-save').addEventListener('click', saveTaskModal);

document.getElementById('settings-open-btn').addEventListener('click', openSettingsModal);
document.getElementById('settings-save-btn').addEventListener('click', saveSettings);
document.getElementById('settings-reset-defaults').addEventListener('click', resetSettingsToDefaults);

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      closeTaskModal();
      closeSettingsModal();
    }
  });
});

document.getElementById('add-subitem-btn').addEventListener('click', () => {
  const container = document.getElementById('subitem-list-modal');
  const row = document.createElement('div');
  row.className = 'subitem-row-modal';
  row.innerHTML = `
    <input type="text" class="subitem-input-modal" placeholder="${i18n[configs.lang].placeholderSubitem}" />
    <button class="subitem-del-modal" type="button">×</button>
  `;
  container.appendChild(row);
  row.querySelector('input').focus();
  row.querySelector('.subitem-del-modal').addEventListener('click', () => row.remove());
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeTaskModal();
    closeSettingsModal();
  }
});

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function escHtml(str) { return str ? str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function escAttr(str) { return str ? str.replace(/"/g,'&quot;').replace(/'/g,'&#39;') : ''; }

connectPicker('picker-bg', 'hex-bg');
connectPicker('picker-text', 'hex-text');
connectPicker('picker-icons', 'hex-icons');
connectPicker('picker-cards', 'hex-cards');
connectPicker('picker-tab-active', 'hex-tab-active');
connectPicker('picker-tab-inactive', 'hex-tab-inactive');
connectPicker('picker-done', 'hex-done');

// Connect priority colors pickers
connectPicker('picker-prio-high', 'hex-prio-high');
connectPicker('picker-prio-med', 'hex-prio-med');
connectPicker('picker-prio-low', 'hex-prio-low');

// Connect D-Day colors pickers
connectPicker('picker-dday-overdue', 'hex-dday-overdue');
connectPicker('picker-dday-today', 'hex-dday-today');
connectPicker('picker-dday-soon', 'hex-dday-soon');
connectPicker('picker-dday-future', 'hex-dday-future');

loadAll();
render();
</script>
</body>
